services:
  backend:
    container_name: Backend_ClickCollect
    build:
      context: ./Backend
      dockerfile: Dockerfile.backend
    ports:
      - "60808:8080"
    networks:
      - "Click_Collect_Net"
    environment:
      - FRONTEND_URL=http://frontend:3000/
      - ALLOWED_ORIGINS=["http://localhost","http://localhost:8080"]
      - APP_CONFIG_TITLE=Click & Collect
      - APP_CONFIG_DESCRITPION=Saas de click & collect
      - APP_CONFIG_VERSION=1.0.0
      - CORS_ALLOW_METHODS=["POST","GET","DELETE","PUT"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: no
